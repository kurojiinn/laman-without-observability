stages:
  - lint
  - build
  - deploy

variables:
  IMAGE_NAME: registry.gitlab.com/khadzhiev404/laman-backend
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  K8S_NAMESPACE: laman-dev
  K8S_DEPLOYMENT: laman-api
  K8S_CONTAINER: laman-api

lint:
  stage: lint
  tags:
    - local
  script:
    - cd Backend
    - docker run --rm -v $(pwd):/app -w /app golangci/golangci-lint:latest golangci-lint run ./...
  only:
    - main
    - merge_requests

picker_panel_test:
  stage: lint
  tags:
    - local
  script:
    - cd Backend/picker-panel
    - npm ci
    - npm test
    - npm run build
  only:
    - main
    - merge_requests

build:
  stage: build
  tags:
    - local
  script:
    - cd Backend
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
    - docker push $IMAGE_NAME:latest
  only:
    - main

deploy_staging:
  stage: deploy
  tags:
    - local
  script:
    - kubectl -n "$K8S_NAMESPACE" get deployment "$K8S_DEPLOYMENT"
    - kubectl -n "$K8S_NAMESPACE" set image deployment/"$K8S_DEPLOYMENT" "$K8S_CONTAINER"="$IMAGE_NAME:$IMAGE_TAG"
    - kubectl -n "$K8S_NAMESPACE" rollout status deployment/"$K8S_DEPLOYMENT" --timeout=180s
  only:
    - main

deploy_prod:
  stage: deploy
  tags:
    - local
  script:
    - kubectl -n laman-prod get deployment laman-api
    - kubectl -n laman-prod set image deployment/laman-api laman-api=$IMAGE_NAME:$IMAGE_TAG
    - kubectl -n laman-prod rollout status deployment/laman-api --timeout=180s
  when: manual
  only:
    - main
