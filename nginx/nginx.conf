map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       '';
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name yuher.ru www.yuher.ru;
    return 301 https://yuher.ru$request_uri;
}

# ─── Единственный HTTPS сервер — всё через порт 443 ────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name yuher.ru www.yuher.ru;

    # Docker's embedded DNS — re-resolves container IPs automatically
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    # API — Go backend
    location /api/ {
        set $upstream_api http://api:8080;
        proxy_pass         $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # MinIO — изображения (bucket laman-images)
    location /laman-images/ {
        proxy_pass       http://minio:9000/laman-images/;
        proxy_set_header Host minio:9000;
        expires          30d;
        add_header       Cache-Control "public, immutable";
    }

    # Админ-панель (nginx внутри контейнера слушает на root /)
    location /admin/ {
        proxy_pass         http://admin-panel:5173/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Панель сборщика (nginx внутри контейнера слушает на root /)
    location /picker/ {
        proxy_pass         http://picker-panel:5174/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Client app (Next.js) — всё остальное
    location / {
        set $upstream_client http://client-app:3000;
        proxy_pass         $upstream_client;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
