apiVersion: apps/v1
kind: Deployment
metadata:
  name: laman-api
  namespace: laman-dev
spec:
  replicas: 1            # на старте 1 реплика, потом поднимем до 2
  selector:
    matchLabels:
      app: laman-api
  template:
    metadata:
      labels:
        app: laman-api
    spec:
      containers:
        - name: laman-api
          image: laman-api:latest
          imagePullPolicy: Never   # брать локальный образ, не лезть в Docker Hub
          ports:
            - containerPort: 8080

          # Все незащищённые переменные берём из ConfigMap
          envFrom:
            - configMapRef:
                name: laman-config

          # Секреты прокидываем отдельно
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: laman-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: laman-secrets
                  key: db-password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: laman-secrets
                  key: db-name
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: laman-secrets
                  key: jwt-secret
            - name: SMS_RU_KEY
              valueFrom:
                secretKeyRef:
                  name: laman-secrets
                  key: sms-ru-key
            - name: SMSRU_API_KEY
              valueFrom:
                secretKeyRef:
                  name: laman-secrets
                  key: sms-ru-key
            - name: TG_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: laman-secrets
                  key: tg-bot-token
            - name: TG_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: laman-secrets
                  key: tg-chat-id
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: laman-secrets
                  key: admin-user
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: laman-secrets
                  key: admin-password

          # Kubernetes проверяет что приложение живо
          livenessProbe:
            httpGet:
              path: /health    # если у тебя нет /health — убери это пока
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10

          # Kubernetes проверяет что приложение готово принимать трафик
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          # Папка для загружаемых файлов (как volumes в docker-compose)
          volumeMounts:
            - name: uploads
              mountPath: /root/uploads

      volumes:
        - name: uploads
          emptyDir: {}     # для локалки достаточно, на проде нужен PVC
