apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: laman-dev
spec:
  serviceName: postgres    # должно совпадать с именем Service
  replicas: 1              # PostgreSQL без кластеризации — всегда 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            # Берём из Secret — пароли не должны лежать в открытом виде
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: laman-secrets
                  key: db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: laman-secrets
                  key: db-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: laman-secrets
                  key: db-name
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          # Проверяем что PostgreSQL готов принимать соединения
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc   # используем PVC который создали
