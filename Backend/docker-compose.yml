services:
  postgres:
    image: postgres:15-alpine
    container_name: laman-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-laman}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laman-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laman-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-laman}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-in-production}
      SERVER_PORT: 8080
      SERVER_HOST: 0.0.0.0
      PUBLIC_URL: ${PUBLIC_URL:-http://192.168.32.225:8080}
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      SMS_RU_KEY: 608B74BB-56A0-2D45-8D9E-A4EB59D5D236
      SMSRU_API_KEY: 608B74BB-56A0-2D45-8D9E-A4EB59D5D236
      TG_BOT_TOKEN: 8559709779:AAHdskP-sNdWjXA6wLATljM9upSXGYsw58I
      TG_CHAT_ID: 6695940715
      TG_COURIER_GROUP_ID: ${TG_COURIER_GROUP_ID:-}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://192.168.32.225:5173,http://192.168.32.225:5174}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/root/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - laman-network
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: laman-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4317:4317"
      - "4318:4318"
    networks:
      - laman-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: laman-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - laman-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: laman-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - laman-network
    restart: unless-stopped

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: laman-admin-panel
    environment:
      - VITE_API_BASE_URL=http://192.168.32.225:8080
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - laman-network
    restart: unless-stopped

  picker-panel:
    build:
      context: ./picker-panel
      dockerfile: Dockerfile
    container_name: laman-picker-panel
    environment:
      - VITE_API_BASE_URL=http://192.168.32.225:8080
    ports:
      - "5174:5174"
    depends_on:
      - api
    networks:
      - laman-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: laman-redis
    ports:
      - "6379:6379"
    networks:
      - laman-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
networks:
  laman-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
