server {
    listen 5174;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — все маршруты отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Статика с кешированием
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
