services:
  postgres:
    image: postgres:15-alpine
    container_name: laman-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laman-network

  redis:
    image: redis:7-alpine
    container_name: laman-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - laman-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: laman-api
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: ${SERVER_PORT}
      SERVER_HOST: ${SERVER_HOST}
      PUBLIC_URL: http://${HOST_IP}:8080
      SMS_RU_KEY: ${SMS_RU_KEY}
      SMSRU_API_KEY: ${SMSRU_API_KEY}
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
      TG_CHAT_ID: ${TG_CHAT_ID}
      TG_COURIER_GROUP_ID: ${TG_COURIER_GROUP_ID}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://${HOST_IP}:3000,http://${HOST_IP}:5173,http://${HOST_IP}:5174
      REDIS_URL: ${REDIS_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./Backend/uploads:/app/uploads
      - ./Backend/migrations:/app/migrations
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - laman-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: laman-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - laman-network
    restart: unless-stopped

networks:
  laman-network:
    driver: bridge

volumes:
  postgres_data:
