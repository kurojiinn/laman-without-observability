services:
  postgres:
    image: postgres:15-alpine
    container_name: laman-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laman-network

  redis:
    image: redis:7-alpine
    container_name: laman-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - laman-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: laman-api
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: ${SERVER_PORT}
      SERVER_HOST: ${SERVER_HOST}
      PUBLIC_URL: https://${HOST_IP}
      SMS_RU_KEY: ${SMS_RU_KEY}
      SMSRU_API_KEY: ${SMSRU_API_KEY}
      SMS_RU_TEST: ${SMS_RU_TEST}
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
      TG_CHAT_ID: ${TG_CHAT_ID}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      COOKIE_SECURE: ${COOKIE_SECURE}
      CORS_ORIGINS: https://${HOST_IP},https://www.${HOST_IP}
      REDIS_URL: ${REDIS_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      # MinIO публичный URL — через nginx, без порта 9000
      MINIO_PUBLIC_URL: https://${HOST_IP}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_USE_SSL: "false"
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./Backend/migrations:/app/migrations
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - laman-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: laman-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    # Порты НЕ пробрасываем — MinIO доступен только через nginx (/laman-images/)
    # Для доступа к консоли MinIO используй: ssh -L 9001:localhost:9001 user@server
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    networks:
      - laman-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: laman-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
        mc mb --ignore-existing local/${MINIO_BUCKET} &&
        mc anonymous set download local/${MINIO_BUCKET}
      "
    networks:
      - laman-network
    restart: "no"

  client-app:
    build:
      context: ./Frontend/client-app
      dockerfile: Dockerfile
      args:
        # /api — без /v1, клиент сам дописывает /v1/...
        NEXT_PUBLIC_API_URL: https://${HOST_IP}/api
        NEXT_PUBLIC_MINIO_URL: https://${HOST_IP}
    container_name: laman-client-app
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - laman-network
    restart: unless-stopped

  admin-panel:
    build:
      context: ./Frontend/admin-panel
      dockerfile: Dockerfile
      args:
        # Без /api — axios сам дописывает /api/v1
        VITE_API_BASE_URL: https://${HOST_IP}
    container_name: laman-admin-panel
    expose:
      - "5173"
    depends_on:
      - api
    networks:
      - laman-network
    restart: unless-stopped

  picker-panel:
    build:
      context: ./Frontend/picker-panel
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://${HOST_IP}
    container_name: laman-picker-panel
    expose:
      - "5174"
    depends_on:
      - api
    networks:
      - laman-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: laman-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - client-app
      - admin-panel
      - picker-panel
    networks:
      - laman-network
    restart: unless-stopped

networks:
  laman-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
